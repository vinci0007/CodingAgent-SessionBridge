name: Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - package.json
  workflow_dispatch:
    inputs:
      version:
        description: Optional version override. Defaults to package.json version.
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      should_release: ${{ steps.meta.outputs.should_release }}
      notes_file: ${{ steps.meta.outputs.notes_file }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate release notes
        id: meta
        run: node scripts/release-notes.mjs "${{ inputs.version }}"

      - name: Upload release notes
        if: steps.meta.outputs.should_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: .release/release-notes.md

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: win-x64
            platform: win-x64
          - os: macos-15-intel
            label: mac-x64
            platform: mac-x64
          - os: macos-15
            label: mac-arm64
            platform: mac-arm64
          - os: ubuntu-22.04
            label: linux-x64
            platform: linux-x64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installers
        if: runner.os == 'Windows'
        run: npm run app:build:win

      - name: Build Windows portable
        if: runner.os == 'Windows'
        run: npm run app:portable:win

      - name: Zip Windows portable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          $dir = "dist-portable/xfer-$version-win-x64"
          Compress-Archive -Path "$dir/*" -DestinationPath "dist-portable/xfer-$version-win-x64-portable.zip" -Force

      - name: Build macOS packages
        if: runner.os == 'macOS'
        run: npm run app:build:mac

      - name: Build macOS portable
        if: runner.os == 'macOS'
        run: npm run app:portable:mac

      - name: Zip macOS artifacts
        if: runner.os == 'macOS'
        run: |
          version="${{ needs.prepare.outputs.version }}"
          platform="${{ matrix.platform }}"
          ditto -c -k --keepParent "dist-portable/xfer-${version}-${platform}" "dist-portable/xfer-${version}-${platform}-portable.zip"
          app_dir="$(find dist-release -name '*.app' -type d | head -n 1)"
          if [ -n "$app_dir" ]; then
            app_zip="${app_dir%.app}.app.zip"
            ditto -c -k --keepParent "$app_dir" "$app_zip"
          fi

      - name: Build Linux packages
        if: runner.os == 'Linux'
        run: npm run app:build:linux

      - name: Build Linux portable
        if: runner.os == 'Linux'
        run: npm run app:portable:linux

      - name: Archive Linux portable
        if: runner.os == 'Linux'
        run: |
          version="${{ needs.prepare.outputs.version }}"
          platform="${{ matrix.platform }}"
          tar -C dist-portable -czf "dist-portable/xfer-${version}-${platform}-portable.tar.gz" "xfer-${version}-${platform}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xfer-${{ needs.prepare.outputs.version }}-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            dist-release/**/*
            dist-portable/*.zip
            dist-portable/*.tar.gz

  publish:
    name: Publish GitHub Release
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          notes="artifacts/release-notes/release-notes.md"
          mapfile -t files < <(find artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.msi' -o -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found"
            exit 1
          fi
          gh release create "$TAG" "${files[@]}" --target "$GITHUB_SHA" --title "xfer $TAG" --notes-file "$notes"
